name: ci

on:
  push:
  pull_request:

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: ./scripts/zig build
      - run: ./scripts/zig build test
  # Landlock attach + adversarial e2e evidence on Linux (single job; e2e runs test-fast once).
  os-sandbox-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build orca
        run: ./scripts/zig build
      - name: Adversarial OS sandbox e2e + evidence (includes test-fast; require attach)
        run: |
          mkdir -p planning/security/evidence
          ./scripts/os-sandbox-adversarial-e2e.sh --require-attach --case ci-linux --binary ./zig-out/bin/orca --out planning/security/evidence
          test -n "$(ls planning/security/evidence/ci-linux-*.json 2>/dev/null)"
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-sandbox-evidence-linux
          path: planning/security/evidence/
          if-no-files-found: error
  # Seatbelt attach proof on macos-14 (single host; not a multi-runner matrix) + adversarial e2e.
  # e2e runs test-fast once — no separate unit step (avoids double test-fast).
  os-sandbox-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build orca
        run: ./scripts/zig build
      - name: Adversarial OS sandbox e2e + evidence on macos-14 (includes test-fast; require attach)
        run: |
          mkdir -p planning/security/evidence
          ./scripts/os-sandbox-adversarial-e2e.sh --require-attach --case ci-macos --binary ./zig-out/bin/orca --out planning/security/evidence
          test -n "$(ls planning/security/evidence/ci-macos-*.json 2>/dev/null)"
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-sandbox-evidence-macos
          path: planning/security/evidence/
          if-no-files-found: error
  rust-daemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust daemon tests
        working-directory: orca-rs
        run: cargo test
      - name: Rust daemon clippy
        working-directory: orca-rs
        run: cargo clippy --all-targets
