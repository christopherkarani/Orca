name: ci

on:
  push:
  pull_request:

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: ./scripts/zig build
      - run: ./scripts/zig build test
  # Landlock attach + adversarial e2e evidence on Linux.
  os-sandbox-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build orca
        run: ./scripts/zig build
      - name: Sandbox unit surface (includes Landlock when ABI present)
        run: ./scripts/zig build test-fast
      - name: Adversarial OS sandbox e2e + evidence
        run: |
          mkdir -p planning/security/evidence
          ./scripts/os-sandbox-adversarial-e2e.sh --case ci-linux --binary ./zig-out/bin/orca --out planning/security/evidence
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-sandbox-evidence-linux
          path: planning/security/evidence/
          if-no-files-found: ignore
  # M-16: Seatbelt matrix + adversarial e2e evidence on macOS.
  os-sandbox-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build orca
        run: ./scripts/zig build
      - name: Sandbox unit surface (Seatbelt real FS deny on matrix hosts)
        run: ./scripts/zig build test-fast
      - name: Adversarial OS sandbox e2e + evidence
        run: |
          mkdir -p planning/security/evidence
          ./scripts/os-sandbox-adversarial-e2e.sh --case ci-macos --binary ./zig-out/bin/orca --out planning/security/evidence
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-sandbox-evidence-macos
          path: planning/security/evidence/
          if-no-files-found: ignore
  rust-daemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust daemon tests
        working-directory: orca-rs
        run: cargo test
      - name: Rust daemon clippy
        working-directory: orca-rs
        run: cargo clippy --all-targets
