name: build

on:
  push:
  pull_request:

jobs:
  build:
    name: zig build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install PCRE2 (shell_engine pack regex)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libpcre2-dev
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install pcre2
          elif [ "${{ runner.os }}" = "Windows" ]; then
            choco install pcre -y || true
            # vcpkg/MSYS fallback paths are covered by build.zig library search paths
            pacman -S --noconfirm mingw-w64-x86_64-pcre2 2>/dev/null || true
          fi
      - name: Build
        shell: bash
        run: ./scripts/zig build
      - name: Assert zig build does not invoke cargo
        shell: bash
        run: ./scripts/assert-zig-build-no-cargo.sh
      - name: Version JSON
        shell: bash
        run: |
          ./zig-out/bin/orca version --json
      - name: Check Windows target from Unix runners
        if: runner.os != 'Windows'
        run: ./scripts/zig build check-windows
      - name: Check release artifact naming references
        shell: bash
        run: |
          grep -R "orca-v.*linux-amd64" scripts packaging .github/workflows
          grep -R "checksums.txt" scripts packaging .github/workflows
