name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.6.0
          cache: npm
          cache-dependency-path: orca-dashboard-ui/package-lock.json
      - name: Dashboard tests and production build
        working-directory: orca-dashboard-ui
        run: |
          npm ci
          npm test
          npm run build
      - name: Unit tests
        run: ./scripts/zig build test
      - name: First-user install and uninstall regressions
        run: |
          ./scripts/install-first-user-regression-test.sh
          ./scripts/uninstall-first-user-regression-test.sh
      - name: Red-team CI
        run: |
          ./scripts/zig build
          ./zig-out/bin/orca redteam --ci
      - name: Validate presets
        shell: bash
        run: |
          for policy in policies/presets/*.yaml; do
            ./zig-out/bin/orca policy check "$policy"
          done
      - name: Package metadata syntax
        shell: bash
        run: |
          bash -n scripts/install.sh
          bash -n scripts/build-release.sh
          bash -n scripts/build-cli-release.sh
          bash -n scripts/generate-checksums.sh
          bash -n scripts/generate-sbom.sh
          bash -n scripts/verify-release.sh
          bash -n scripts/release-dry-run.sh
          bash -n scripts/docker-install-layout-smoke-test.sh
          bash -n scripts/os-sandbox-adversarial-e2e.sh
          ruby -c packaging/homebrew/Formula/orca.rb
          python3 -m json.tool packaging/scoop/orca.json >/dev/null
          python3 -m json.tool packaging/npm/package.json >/dev/null
          grep -q checksum packaging/docker/Dockerfile
      - name: OS sandbox e2e selftest (fixtures only)
        shell: bash
        run: ORCA_E2E_SELFTEST=1 ./scripts/os-sandbox-adversarial-e2e.sh
      - name: Release dry-run
        shell: bash
        run: ./scripts/release-dry-run.sh
