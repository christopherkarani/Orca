name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Unit tests
        run: zig build test
      - name: Red-team CI
        run: |
          zig build
          ./zig-out/bin/aegis redteam --ci
      - name: Validate presets
        shell: bash
        run: |
          for policy in policies/presets/*.yaml; do
            ./zig-out/bin/aegis policy check "$policy"
          done
      - name: Package metadata syntax
        shell: bash
        run: |
          bash -n scripts/install.sh
          bash -n scripts/build-release.sh
          bash -n scripts/generate-checksums.sh
          bash -n scripts/generate-sbom.sh
          ruby -c packaging/homebrew/aegis.rb
          python3 -m json.tool packaging/scoop/aegis.json >/dev/null
          python3 -m json.tool packaging/npm/package.json >/dev/null
          grep -q checksum packaging/docker/Dockerfile
