name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without leading v
        required: true
        default: 1.2.3
      signing_enabled:
        description: Run optional signing hook
        required: true
        default: "0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ORCA_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      # Mac cut-release (scripts/cut-release.sh) is the primary publisher. When a
      # v* tag is pushed after assets already exist (checksums.txt on the release),
      # skip the full CI rebuild so we do not double-upload or race the Mac cutter.
      # workflow_dispatch remains a manual backup path and always runs.
      - name: Resolve skip flag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          VER="${ORCA_VERSION#v}"
          echo "ORCA_VERSION=${VER}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "SKIP_RELEASE=0" >> "$GITHUB_ENV"
            exit 0
          fi
          if gh release view "v${VER}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if gh release view "v${VER}" --repo "$GITHUB_REPOSITORY" --json assets \
              --jq '.assets[].name' 2>/dev/null | grep -qx 'checksums.txt'; then
              echo "Release v${VER} already has checksums.txt; skipping CI release job (Mac cut-release primary)."
              echo "SKIP_RELEASE=1" >> "$GITHUB_ENV"
              exit 0
            fi
          fi
          echo "SKIP_RELEASE=0" >> "$GITHUB_ENV"

      - name: Early exit when skipped
        if: env.SKIP_RELEASE == '1'
        run: echo "No-op: assets already published for this tag."

      - uses: mlugg/setup-zig@v2
        if: env.SKIP_RELEASE != '1'
        with:
          version: 0.16.0
      # PCRE2 is Zig-built from source for each -Dtarget in build-release.sh; no host libpcre2-dev.
      - name: Normalize version metadata
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: |
          echo "ORCA_COMMIT=${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "ORCA_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Setup Node.js
        if: env.SKIP_RELEASE != '1'
        uses: actions/setup-node@v4
        with:
          node-version: 22.6.0
          cache: npm
          cache-dependency-path: orca-dashboard-ui/package-lock.json
      - name: Build Next.js dashboard
        if: env.SKIP_RELEASE != '1'
        shell: bash
        working-directory: orca-dashboard-ui
        run: |
          npm ci
          npm run build
      - name: Verify dashboard build
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: |
          if [ ! -f "orca-dashboard-ui/dist/index.html" ]; then
            echo "::error::Dashboard build did not produce orca-dashboard-ui/dist/index.html"
            exit 1
          fi
          if ! grep -q 'class="[^"]*dark[^"]*"' orca-dashboard-ui/dist/index.html; then
            echo "::error::Dashboard build output is not the dark Next.js dashboard (missing dark class on <html>)"
            exit 1
          fi
          echo "Dashboard build verified: dark Next.js dashboard present with _next/static/ output."
      - name: Test before release
        if: env.SKIP_RELEASE != '1'
        run: ./scripts/zig build test
      - name: Red-team CI
        if: env.SKIP_RELEASE != '1'
        run: |
          ./scripts/zig build -Dversion="$ORCA_VERSION" -Dcommit="$ORCA_COMMIT" -Dbuild-date="$ORCA_BUILD_DATE"
          ./zig-out/bin/orca redteam --ci
      - name: Build release artifacts
        if: env.SKIP_RELEASE != '1'
        shell: bash
        env:
          ORCA_SIGNING_ENABLED: ${{ github.event.inputs.signing_enabled || '0' }}
          ORCA_SIGNING_COMMAND: ${{ secrets.ORCA_SIGNING_COMMAND }}
        run: ORCA_VERSION="$ORCA_VERSION" ORCA_COMMIT="$ORCA_COMMIT" ORCA_BUILD_DATE="$ORCA_BUILD_DATE" ./scripts/build-release.sh
      - name: Package plugins
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: ./scripts/package-plugins.sh
      - name: Verify plugin artifacts
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: |
          ls -la dist/plugins/
          cat dist/plugins/orca-plugin-checksums.txt
      - name: Verify plugin checksums
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: |
          cd dist/plugins && shasum -a 256 -c orca-plugin-checksums.txt
      - name: Secret scan over plugin artifacts
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: |
          SCAN_ISSUES=0
          for file in dist/plugins/*.zip; do
            [ -f "$file" ] || continue
            tmpdir="$(mktemp -d)"
            unzip -q "$file" -d "$tmpdir"
            if grep -riE "(api_key|apikey|secret|token|password|private_key|privkey)[[:space:]]*[:=][[:space:]]*[\"']?[a-zA-Z0-9_/-]{16,}" "$tmpdir" 2>/dev/null | grep -v "fake_" | grep -v "example" | grep -v "placeholder" | grep -v "your_"; then
              echo "WARNING: Potential secret pattern in $file" >&2
              SCAN_ISSUES=$((SCAN_ISSUES + 1))
            fi
            rm -rf "$tmpdir"
          done
          if [ "$SCAN_ISSUES" -gt 0 ]; then
            echo "Secret scan found $SCAN_ISSUES potential issues. Review artifacts before release." >&2
            exit 1
          fi
          echo "Secret scan passed."
      - name: Verify checksums
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: |
          ./scripts/verify-release.sh dist
      - name: Installed layout smoke
        if: env.SKIP_RELEASE != '1'
        shell: bash
        run: ORCA_DIST_DIR=dist ./scripts/install-layout-smoke-test.sh
      - name: Ensure SBOM hook output exists
        if: env.SKIP_RELEASE != '1'
        run: test -s dist/sbom.json
      - name: Upload release artifacts
        if: env.SKIP_RELEASE != '1'
        uses: actions/upload-artifact@v4
        with:
          name: orca-release-${{ env.ORCA_VERSION }}
          path: |
            dist/ryk-v*.tar.gz
            dist/ryk-v*.zip
            dist/orca-v*.tar.gz
            dist/orca-v*.zip
            dist/checksums.txt
            dist/sbom.json
            dist/release-manifest.json
            dist/package-manifests/**
            dist/plugins/*.zip
            dist/plugins/orca-plugin-checksums.txt

      # Attach all dist/ assets (including checksums.txt) to the GitHub Release.
      # Without this step the artifacts only land in the workflow run and never
      # reach the release page, so install.sh's checksum download 404s.
      # Hard-gate on checksums.txt so a release can never publish without it.
      - name: Attach assets to GitHub Release
        if: env.SKIP_RELEASE != '1'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          test -s dist/checksums.txt || {
            echo "::error::dist/checksums.txt is missing or empty; refusing to publish release without checksums"
            exit 1
          }
          gh release create "v${ORCA_VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ryk v${ORCA_VERSION}" \
            --verify-tag \
            --generate-notes || true
          shopt -s nullglob
          assets=(
            dist/ryk-v*.tar.gz
            dist/ryk-v*.zip
            dist/orca-v*.tar.gz
            dist/orca-v*.zip
            dist/checksums.txt
            dist/sbom.json
            dist/release-manifest.json
            dist/plugins/*.zip
            dist/plugins/orca-plugin-checksums.txt
          )
          gh release upload "v${ORCA_VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "${assets[@]}"
