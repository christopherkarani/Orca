name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without leading v
        required: true
        default: 0.19.0-dev
      signing_enabled:
        description: Run optional signing hook
        required: true
        default: "0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      ORCA_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Normalize version
        shell: bash
        run: |
          ORCA_VERSION="${ORCA_VERSION#v}"
          echo "ORCA_VERSION=$ORCA_VERSION" >> "$GITHUB_ENV"
          echo "ORCA_COMMIT=${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "ORCA_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Test before release
        run: zig build test
      - name: Red-team CI
        run: |
          zig build -Dversion="$ORCA_VERSION" -Dcommit="$ORCA_COMMIT" -Dbuild-date="$ORCA_BUILD_DATE"
          ./zig-out/bin/orca redteam --ci
      - name: Build release artifacts
        shell: bash
        env:
          ORCA_SIGNING_ENABLED: ${{ github.event.inputs.signing_enabled || '0' }}
          ORCA_SIGNING_COMMAND: ${{ secrets.ORCA_SIGNING_COMMAND }}
        run: ORCA_VERSION="$ORCA_VERSION" ORCA_COMMIT="$ORCA_COMMIT" ORCA_BUILD_DATE="$ORCA_BUILD_DATE" ./scripts/build-release.sh
      - name: Package plugins
        shell: bash
        run: ./scripts/package-plugins.sh
      - name: Verify plugin artifacts
        shell: bash
        run: |
          ls -la dist/plugins/
          cat dist/plugins/orca-plugin-checksums.txt
      - name: Verify plugin checksums
        shell: bash
        run: |
          cd dist/plugins && shasum -a 256 -c orca-plugin-checksums.txt
      - name: Secret scan over plugin artifacts
        shell: bash
        run: |
          SCAN_ISSUES=0
          for file in dist/plugins/*.zip; do
            [ -f "$file" ] || continue
            tmpdir="$(mktemp -d)"
            unzip -q "$file" -d "$tmpdir"
            if grep -riE "(api_key|apikey|secret|token|password|private_key|privkey)[[:space:]]*[:=][[:space:]]*[\"']?[a-zA-Z0-9_/-]{16,}" "$tmpdir" 2>/dev/null | grep -v "fake_" | grep -v "example" | grep -v "placeholder" | grep -v "your_"; then
              echo "WARNING: Potential secret pattern in $file" >&2
              SCAN_ISSUES=$((SCAN_ISSUES + 1))
            fi
            rm -rf "$tmpdir"
          done
          if [ "$SCAN_ISSUES" -gt 0 ]; then
            echo "Secret scan found $SCAN_ISSUES potential issues. Review artifacts before release." >&2
            exit 1
          fi
          echo "Secret scan passed."
      - name: Verify checksums
        shell: bash
        run: |
          ./scripts/verify-release.sh dist
      - name: Ensure SBOM hook output exists
        run: test -s dist/sbom.json
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-release-${{ env.ORCA_VERSION }}
          path: |
            dist/orca-v*.tar.gz
            dist/orca-v*.zip
            dist/checksums.txt
            dist/sbom.json
            dist/release-manifest.json
            dist/package-manifests/**
            dist/plugins/*.zip
            dist/plugins/orca-plugin-checksums.txt
