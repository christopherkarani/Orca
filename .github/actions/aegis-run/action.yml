name: Aegis Run
description: Run a repository command through local Aegis in CI without hosted Aegis services.
inputs:
  command:
    description: Command to execute after `aegis run --mode ci --`.
    required: true
  policy:
    description: Optional policy path.
    required: false
    default: .aegis/policy.yaml
runs:
  using: composite
  steps:
    - name: Check Aegis policy
      shell: bash
      env:
        AEGIS_ACTION_POLICY: ${{ inputs.policy }}
      run: |
        if [ -f "$AEGIS_ACTION_POLICY" ]; then
          aegis policy check "$AEGIS_ACTION_POLICY"
        else
          echo "Aegis policy not found at $AEGIS_ACTION_POLICY; initialize one with 'aegis init --preset github-actions'." >&2
          exit 1
        fi
    - name: Run command through Aegis
      shell: bash
      env:
        AEGIS_ACTION_COMMAND: ${{ inputs.command }}
      run: |
        aegis run --mode ci -- bash -c "$AEGIS_ACTION_COMMAND"
