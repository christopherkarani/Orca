name: Aegis Run
description: Run a repository command through local Aegis in CI without hosted Aegis services.
inputs:
  command:
    description: Command to execute after `aegis run --mode ci --`.
    required: true
  policy:
    description: Optional policy path.
    required: false
    default: .aegis/policy.yaml
runs:
  using: composite
  steps:
    - name: Check Aegis policy
      shell: bash
      run: |
        if [ -f "${{ inputs.policy }}" ]; then
          aegis policy check "${{ inputs.policy }}"
        else
          echo "Aegis policy not found at ${{ inputs.policy }}; initialize one with 'aegis init --preset github-actions'." >&2
          exit 1
        fi
    - name: Run command through Aegis
      shell: bash
      run: aegis run --mode ci -- ${{ inputs.command }}
