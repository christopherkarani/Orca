name: Orca Run
description: Run a repository command through local Orca in CI without hosted Orca services.
inputs:
  command:
    description: Command to execute after `orca run --mode ci --`.
    required: true
  policy:
    description: Optional policy path.
    required: false
    default: .orca/policy.yaml
runs:
  using: composite
  steps:
    - name: Check Orca policy
      shell: bash
      env:
        ORCA_ACTION_POLICY: ${{ inputs.policy }}
      run: |
        if [ -f "$ORCA_ACTION_POLICY" ]; then
          orca policy check "$ORCA_ACTION_POLICY"
        else
          echo "Orca policy not found at $ORCA_ACTION_POLICY; initialize one with 'orca init --preset github-actions'." >&2
          exit 1
        fi
    - name: Run command through Orca
      shell: bash
      env:
        ORCA_ACTION_COMMAND: ${{ inputs.command }}
      run: |
        orca run --mode ci -- bash -c "$ORCA_ACTION_COMMAND"
