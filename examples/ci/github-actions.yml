name: aegis
on:
  push:
  pull_request:

jobs:
  aegis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: zig build
      - name: Test
        run: zig build test
      - name: Red-team
        run: ./zig-out/bin/orca redteam --ci --json > aegis-redteam.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aegis-artifacts
          path: |
            .orca/**
            aegis-redteam.json
