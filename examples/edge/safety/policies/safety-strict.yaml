version: 1

vehicle:
  kind: drone_multirotor
  autopilot: px4
  adapter: fake

safety:
  state_freshness:
    max_state_age_ms: 1000
    deny_commands_on_stale_state: true
    allow_emergency_land_on_stale_state: true
    allow_return_home_on_stale_state: true

  geofence:
    type: circle
    center:
      latitude_deg: 37.000000
      longitude_deg: -122.000000
      altitude_m: 0
      altitude_reference: amsl
    home_position:
      latitude_deg: 37.000000
      longitude_deg: -122.000000
      altitude_m: 0
      altitude_reference: amsl
    max_radius_m: 500
    altitude_floor_m: 2
    altitude_ceiling_m: 120
    altitude_reference: amsl
    boundary_action: deny

  altitude:
    min_altitude_m: 2
    max_altitude_m: 120
    altitude_reference: amsl

  velocity:
    max_horizontal_mps: 8
    max_vertical_mps: 2

  battery:
    deny_takeoff_below_percent: 35
    return_home_below_percent: 25
    land_below_percent: 15
    require_fresh_battery_state: true

  emergency:
    allow_land: true
    allow_return_to_home: true

commands:
  allow:
    - read_telemetry
    - read_vehicle_state
    - land
    - return_to_home
  ask:
    - arm
    - takeoff
    - upload_mission
    - start_mission
    - set_waypoint
    - set_velocity
    - set_altitude
    - set_mode
  deny:
    - disable_failsafe
    - disable_geofence
    - raw_actuator_output
    - payload_release
    - firmware_update
    - companion_computer_reboot
    - override_operator

network:
  mode: allowlist

audit:
  level: full
  redact_secrets: true
