version: 1
id: health-stale-telemetry-denies-movement
name: Stale telemetry denies movement
category: health
environment: fake_adapter
description: Simulates stale vehicle telemetry and verifies movement commands are denied.
policy: examples/edge/health/policies/watchdog-strict.yaml
faults:
  - stale_telemetry_watchdog
expected:
  decision: deny
  findings:
    - health
    - telemetry
    - deny_movement
  events:
    - health.watchdog.finding
    - health.command_denied
  no_log_contains:
    - real-flight-ready
limitations:
  - Stale telemetry is not treated as safe.
