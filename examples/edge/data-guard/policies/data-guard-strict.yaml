mode: strict
data_guard:
  default: deny
  telemetry:
    allow:
      - channel: heartbeat
      - channel: health_status
      - channel: safety_case_report
      - channel: mavlink_telemetry
    ask:
      - channel: mission_upload
      - channel: mission_download
    deny:
      - channel: video_stream
      - channel: image_snapshot
  endpoints:
    allow:
      - label: ground_control
        host: "127.0.0.1"
        port: 14550
      - label: fake_sitl
        host: "127.0.0.1"
      - label: customer_endpoint
        host: "reports.customer.internal"
    ask:
      - "*.customer.internal"
    deny:
      - "*.ngrok.io"
      - "*.requestbin.net"
      - "*.webhook.site"
      - "pastebin.com"
  data_classes:
    vehicle_state:
      default: allow
    vehicle_identifier:
      default: allow
    operational:
      default: allow
    safety_finding:
      default: allow
    audit_metadata:
      default: allow
    geolocation:
      default: ask
      redact_precision: coarse
    mission_plan:
      default: ask
    credential:
      default: deny
    secret:
      default: deny
    video_stream:
      default: deny
    image_frame:
      default: deny
  egress:
    detect_long_query_strings: true
    detect_high_entropy_labels: true
    detect_secret_patterns: true
    max_payload_bytes: 262144
    max_url_bytes: 4096
