version: 1
vehicle: { kind: drone_multirotor, autopilot: px4, adapter: fake }
safety:
  state_freshness: { max_state_age_ms: 1000, deny_commands_on_stale_state: true, allow_emergency_land_on_stale_state: true }
  emergency: { allow_land: true, allow_return_to_home: true, allow_hold_position: true }
commands:
  allow: [read_telemetry, read_vehicle_state, land, return_to_home, hold_position]
  ask: [arm, takeoff]
  deny: [disable_failsafe, disable_geofence, raw_actuator_output]
audit: { level: full, redact_secrets: true }
