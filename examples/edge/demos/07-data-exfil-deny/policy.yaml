mode: strict
data_guard:
  default: deny
  telemetry:
    allow:
      - channel: heartbeat
      - channel: health_status
      - channel: safety_case_report
      - channel: mavlink_telemetry
    ask:
      - channel: mission_upload
    deny:
      - channel: video_stream
  endpoints:
    allow:
      - label: ground_control
        host: "127.0.0.1"
        port: 14550
    deny:
      - "*.webhook.site"
      - "*.ngrok.io"
  data_classes:
    mission_plan: { default: ask }
    credential: { default: deny }
    secret: { default: deny }
    vehicle_state: { default: allow }
  egress:
    detect_long_query_strings: true
    detect_high_entropy_labels: true
    detect_secret_patterns: true
    max_payload_bytes: 262144
    max_url_bytes: 4096
