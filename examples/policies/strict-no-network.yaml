version: 1
mode: strict

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*KEY*"
    - "*PASSWORD*"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "~/.ssh/**"
      - "~/.aws/**"
  write:
    allow:
      - "./**"
    deny:
      - "./.git/**"
      - "./.orca/**"
    mode: staged

commands:
  default: deny
  allow:
    - "git status"
    - "git diff *"
    - "zig build *"
    - "echo *"
  deny:
    - "curl *"
    - "wget *"
    - "rm -rf *"
    - "sudo *"

network:
  mode: off
  default: deny
  allow:
  deny:
    - "*"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: deny
  allow:
    - "*.list_*"
    - "*.get_*"
  deny:
    - "*.run_command"
    - "*.delete_*"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
