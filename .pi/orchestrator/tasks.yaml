version: 1
config:
  maxConcurrency: 1
  maxIterations: 100
  cwd: "."
  agentDir: "~/.pi/agent"
  model: "anthropic/claude-sonnet-4"
  thinkingLevel: "medium"
  timeoutMs: 300000
  resultsDir: ".pi/orchestrator/results"
  includeOrchestratorExtension: false
tasks:
  - id: explore-sandbox
    type: explore
    prompt: >
      Investigate how the Linux sandbox backend works in src/sandbox/linux.zig.
      Trace how it is initialized from src/cli/run.zig and what system calls it uses.
      Report the exact files involved and any extension points for adding landlock support.
    status: pending
    blockedBy: []
    parentId: null
    maxTurns: 20

  - id: plan-landlock
    type: plan
    prompt: >
      Create a detailed implementation plan for adding Linux Landlock sandbox support
      to the Aegis/Orca security runtime.

      Requirements:
      1. Landlock LSM support in src/sandbox/linux.zig
      2. Policy integration: new sandbox action type in schemas/policy-v1.json
      3. CLI flag: --sandbox=landlock
      4. Backwards compatibility with existing sandbox modes
      5. Tests in tests/phase25_cli_hardening.zig or a new test file

      Use the findings from the explore-sandbox task. Identify risks and estimate complexity.
    status: pending
    blockedBy:
      - explore-sandbox
    parentId: null
    maxTurns: 15

  - id: implement-landlock-zig
    type: zig
    prompt: >
      Implement the Linux Landlock sandbox backend following the plan from plan-landlock.

      Focus on:
      - src/sandbox/linux.zig: landlock initialization, rule compilation, enforcement
      - src/sandbox/mod.zig: mode dispatch
      - src/cli/run.zig: --sandbox=landlock flag wiring
      - tests/: at least one integration test

      Use TDD. Write the test first, then implement.
      Run zig build test after each significant change.
    status: pending
    blockedBy:
      - plan-landlock
    parentId: plan-landlock
    maxTurns: 30

  - id: update-policy-schema
    type: policy
    prompt: >
      Update the policy schema and presets to support the new landlock sandbox mode.

      Changes needed:
      - schemas/policy-v1.json: add "landlock" to sandbox action enum
      - policies/presets/strict-local.yaml: add landlock sandbox rule
      - docs/policy.md: document the new sandbox mode

      Validate all changed policies against the schema before finishing.
    status: pending
    blockedBy:
      - implement-landlock-zig
    parentId: plan-landlock
    maxTurns: 15
