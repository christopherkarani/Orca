version: 1
vehicle:
  kind: drone_multirotor
  autopilot: px4
  adapter: fake
safety:
  state_freshness:
    max_state_age_ms: 1000
    deny_commands_on_stale_state: true
    allow_emergency_land_on_stale_state: true
    allow_return_home_on_stale_state: true
  geofence:
    type: circle
    center:
      latitude_deg: 37.0
      longitude_deg: -122.0
      altitude_m: 0
      altitude_reference: amsl
    home_position:
      latitude_deg: 37.0
      longitude_deg: -122.0
      altitude_m: 0
      altitude_reference: amsl
    max_radius_m: 500
    altitude_floor_m: 2
    altitude_ceiling_m: 120
    altitude_reference: amsl
    boundary_action: deny
commands:
  allow:
    - read_telemetry
    - read_vehicle_state
    - land
    - return_to_home
    - hold_position
  ask:
    - arm
    - takeoff
    - set_waypoint
  deny:
    - disable_failsafe
    - disable_geofence
    - raw_actuator_output
watchdog:
  enabled: true
  heartbeat_timeout_ms: 2000
  state_stale_after_ms: 1000
  command_timeout_ms: 1500
  max_command_queue_depth: 100
  max_audit_queue_depth: 1000
  fail_closed_on_audit_failure: true
  fail_closed_on_policy_failure: true
  fail_closed_on_state_expiry: true
  recommended_fallback_order: [land, hold_position, return_to_home]
  degraded_mode:
    on_agent_stale: observe_only
    on_adapter_stale: observe_only
    on_telemetry_stale: observe_only
    on_audit_failure: fail_closed
    on_policy_error: fail_closed
    allow_emergency_land: true
    allow_return_to_home: policy
    allow_hold: policy
network:
  mode: allowlist
audit:
  level: full
  redact_secrets: true
