version: 1

vehicle:
  kind: drone_multirotor
  autopilot: px4
  adapter: mavlink

safety:
  state_freshness:
    max_state_age_ms: 500
    deny_commands_on_stale_state: true
    allow_emergency_land_on_stale_state: true

  geofence:
    type: circle
    center:
      latitude_deg: 37.000000
      longitude_deg: -122.000000
      altitude_m: 0
      altitude_reference: amsl
    max_radius_m: 300
    altitude_floor_m: 2
    altitude_ceiling_m: 100
    altitude_reference: amsl
    boundary_action: deny

  battery:
    deny_takeoff_below_percent: 40
    return_home_below_percent: 25
    land_below_percent: 15
    require_fresh_battery_state: true

commands:
  allow:
    - land
    - return_to_home
  ask:
    - arm
    - takeoff
    - set_waypoint
    - upload_mission
    - start_mission
  deny:
    - disable_failsafe
    - disable_geofence
    - raw_actuator_output
    - firmware_update
    - override_operator

network:
  mode: allowlist

audit:
  level: full
  redact_secrets: true
