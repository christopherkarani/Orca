version: 1
vehicle:
  kind: drone_multirotor
  autopilot: fake
  adapter: fake
safety:
  state_freshness:
    max_state_age_ms: 1000
    deny_commands_on_stale_state: true
commands:
  allow:
    - read_telemetry
    - read_vehicle_state
    - land
  deny:
    - disable_failsafe
    - disable_geofence
    - raw_actuator_output
    - override_operator
watchdog:
  enabled: true
  degraded_mode:
    on_agent_stale: deny_high_risk
    on_adapter_stale: deny_high_risk
    on_telemetry_stale: deny_movement
    on_audit_failure: fail_closed
    on_policy_error: fail_closed
audit:
  level: full
  redact_secrets: true
