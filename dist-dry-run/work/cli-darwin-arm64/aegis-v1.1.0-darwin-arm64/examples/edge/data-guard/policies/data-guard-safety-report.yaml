mode: strict
data_guard:
  default: deny
  telemetry:
    allow:
      - channel: safety_case_report
      - channel: audit_report
  endpoints:
    allow:
      - label: customer_endpoint
        host: "reports.customer.internal"
  data_classes:
    safety_finding:
      default: allow
    audit_metadata:
      default: allow
    customer_identifier:
      default: ask
    secret:
      default: deny
    credential:
      default: deny
  egress:
    detect_secret_patterns: true
    max_payload_bytes: 262144
    max_url_bytes: 4096
