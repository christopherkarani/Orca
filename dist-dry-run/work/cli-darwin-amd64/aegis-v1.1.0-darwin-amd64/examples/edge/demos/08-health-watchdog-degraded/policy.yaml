version: 1
vehicle: { kind: drone_multirotor, autopilot: px4, adapter: fake }
safety:
  state_freshness: { max_state_age_ms: 1000, deny_commands_on_stale_state: true }
commands:
  allow: [read_telemetry, read_vehicle_state, land]
  ask: [set_waypoint]
  deny: [disable_failsafe]
watchdog:
  enabled: true
  heartbeat: { agent_max_age_ms: 1000, adapter_max_age_ms: 1000, mavlink_max_age_ms: 1000, px4_sitl_max_age_ms: 1500, ardupilot_sitl_max_age_ms: 1500 }
  telemetry: { vehicle_state_max_age_ms: 1000, position_max_age_ms: 1000, battery_max_age_ms: 2000, gps_max_age_ms: 2000, link_max_age_ms: 1000 }
  audit: { require_audit_writer: true, fail_closed_on_audit_error: true, max_event_append_latency_ms: 100 }
  degraded_mode: { on_agent_stale: deny_high_risk, on_adapter_stale: deny_high_risk, on_telemetry_stale: deny_movement, on_audit_failure: fail_closed, on_policy_error: fail_closed, allow_emergency_land: true, allow_return_to_home: policy, allow_hold: policy }
audit: { level: full, redact_secrets: true }
