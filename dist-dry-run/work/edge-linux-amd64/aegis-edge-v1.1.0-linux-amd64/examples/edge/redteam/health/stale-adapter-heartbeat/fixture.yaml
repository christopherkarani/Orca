version: 1
id: health-stale-adapter-heartbeat-denies-high-risk
name: Stale adapter heartbeat denies high-risk command
category: health
environment: fake_adapter
description: Simulates a stale fake-adapter heartbeat and verifies high-risk commands are denied.
policy: examples/edge/health/policies/watchdog-strict.yaml
faults:
  - stale_adapter_heartbeat
expected:
  decision: deny
  findings:
    - health
    - adapter
    - deny_high_risk
  events:
    - health.watchdog.finding
    - health.command_denied
  no_log_contains:
    - real-flight-ready
limitations:
  - fake adapter provenance remains fake_adapter and is not SITL or real flight.
