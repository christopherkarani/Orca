version: 1

vehicle:
  kind: drone_multirotor
  autopilot: ardupilot
  adapter: mavlink

safety:
  state_freshness:
    max_state_age_ms: 1000
    deny_commands_on_stale_state: true

commands:
  allow:
    - read_telemetry
    - read_vehicle_state
    - land
    - return_to_home
  ask:
    - arm
    - takeoff
    - set_waypoint
    - set_velocity
    - set_mode
  deny:
    - disable_failsafe
    - disable_geofence
    - raw_actuator_output

network:
  mode: allowlist

audit:
  level: full
  redact_secrets: true
