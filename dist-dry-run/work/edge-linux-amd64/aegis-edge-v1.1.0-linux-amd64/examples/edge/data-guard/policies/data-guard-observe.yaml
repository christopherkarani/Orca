mode: observe
data_guard:
  default: ask
  telemetry:
    allow:
      - channel: heartbeat
      - channel: health_status
      - channel: mavlink_telemetry
      - channel: safety_case_report
    deny:
      - channel: video_stream
  endpoints:
    allow:
      - label: ground_control
        host: "127.0.0.1"
      - label: fake_sitl
        host: "127.0.0.1"
  data_classes:
    geolocation:
      default: ask
      redact_precision: coarse
    mission_plan:
      default: ask
    credential:
      default: deny
    secret:
      default: deny
  egress:
    detect_long_query_strings: true
    detect_high_entropy_labels: true
    detect_secret_patterns: true
    max_payload_bytes: 262144
    max_url_bytes: 4096
