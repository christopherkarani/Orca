version: 1
vehicle:
  kind: drone_multirotor
  autopilot: px4
  adapter: fake
safety:
  state_freshness:
    max_state_age_ms: 1000
    deny_commands_on_stale_state: true
commands:
  allow:
    - read_telemetry
    - land
  deny:
    - disable_failsafe
    - raw_actuator_output
watchdog:
  enabled: true
  audit:
    require_audit_writer: true
    fail_closed_on_audit_error: true
    max_event_append_latency_ms: 100
  degraded_mode:
    on_audit_failure: fail_closed
audit:
  level: full
  redact_secrets: true
