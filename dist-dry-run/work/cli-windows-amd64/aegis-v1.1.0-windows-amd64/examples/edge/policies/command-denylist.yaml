version: 1

vehicle:
  kind: drone_multirotor
  autopilot: fake
  adapter: fake

safety:
  state_freshness:
    max_state_age_ms: 1000
    deny_commands_on_stale_state: true
    allow_emergency_land_on_stale_state: true

  geofence:
    type: circle
    center:
      latitude_deg: 37.000000
      longitude_deg: -122.000000
      altitude_m: 0
      altitude_reference: amsl
    max_radius_m: 250
    altitude_floor_m: 2
    altitude_ceiling_m: 60
    altitude_reference: amsl
    boundary_action: deny

  velocity:
    max_horizontal_mps: 4
    max_vertical_mps: 1

  battery:
    deny_takeoff_below_percent: 50
    return_home_below_percent: 30
    land_below_percent: 20
    require_fresh_battery_state: true

commands:
  allow:
    - read_telemetry
    - read_vehicle_state
    - land
  ask:
    - arm
    - takeoff
  deny:
    - disable_failsafe
    - disable_geofence
    - raw_actuator_output
    - payload_release
    - firmware_update
    - override_operator

network:
  mode: allowlist

audit:
  level: full
  redact_secrets: true

