version: 1
id: health-stale-mavlink-heartbeat-creates-finding
name: Missing MAVLink heartbeat creates health finding
category: health
environment: fake_adapter
description: Simulates a missing MAVLink heartbeat and verifies watchdog health records the link finding.
policy: examples/edge/health/policies/watchdog-strict.yaml
faults:
  - stale_mavlink_heartbeat
expected:
  decision: deny
  findings:
    - health
    - mavlink
    - deny_high_risk
  events:
    - health.watchdog.finding
    - health.command_denied
  no_log_contains:
    - real-flight-ready
limitations:
  - MAVLink heartbeat evidence is deterministic fake-adapter evidence only.
