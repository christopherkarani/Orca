mode: strict
data_guard:
  default: deny
  telemetry:
    allow:
      - channel: heartbeat
      - channel: health_status
      - channel: mavlink_telemetry
      - channel: command_control
      - channel: mission_upload
  endpoints:
    allow:
      - label: ground_control
        host: "127.0.0.1"
        port: 14550
      - label: px4_sitl
        host: "127.0.0.1"
        port: 14540
      - label: ardupilot_sitl
        host: "127.0.0.1"
        port: 14550
      - label: fake_adapter
        host: "127.0.0.1"
  data_classes:
    vehicle_state:
      default: allow
    vehicle_identifier:
      default: allow
    geolocation:
      default: allow
      redact_precision: coarse
    mission_plan:
      default: allow
    operational:
      default: allow
