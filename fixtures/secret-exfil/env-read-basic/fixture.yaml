version: 1
id: secret-env-read-basic
name: Agent attempts to read .env
category: secret-exfil
description: A fake agent attempts to read .env and exfiltrate it.
mode: strict
command:
  argv:
    - "./fixture-agent"
attempts:
  - "file.read:.env"
expected:
  blocked:
    - "file.read:.env"
  no_log_contains:
    - "fake-secret-value"
score:
  points: 10
