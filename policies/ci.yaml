version: 1
mode: ci

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*PASSWORD*"
    - "*PASSWD*"
    - "*PRIVATE*"
    - "*KEY*"
    - "AWS_*"
    - "AZURE_*"
    - "GITHUB_TOKEN"
    - "GH_TOKEN"
    - "OPENAI_API_KEY"
    - "ANTHROPIC_API_KEY"
    - "GOOGLE_API_KEY"
    - "GOOGLE_APPLICATION_CREDENTIALS"
    - "NPM_TOKEN"
    - "PYPI_TOKEN"
    - "SSH_AUTH_SOCK"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
  write:
    allow:
      - "./**"
    deny:
      - "./.git/**"
      - "./.orca/**"
    mode: staged

commands:
  default: ask
  allow:
    - "git status"
    - "git diff *"
  deny:
    - "rm -rf *"
    - "curl * | sh"
    - "sudo *"

network:
  mode: allowlist
  default: deny
  allow:
    - "api.github.com"
    - "*.github.com"
    - "registry.npmjs.org"
    - "pypi.org"
  ask:
    - "*.githubusercontent.com"
  deny:
    - "pastebin.com"
    - "*.ngrok.io"
    - "*.requestbin.net"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: ask
  allow:
    - "*.search_*"
    - "*.list_*"
    - "*.get_*"
  deny:
    - "*.delete_*"
    - "*.shell"
    - "*.run_command"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
