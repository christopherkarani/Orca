# Aegis preset: cline-roo
# Generic/experimental: conservative policy for local editor agents with MCP-style extensions.
version: 1
mode: ask

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*PASSWORD*"
    - "*PASSWD*"
    - "*PRIVATE*"
    - "*KEY*"
    - "AWS_*"
    - "GITHUB_TOKEN"
    - "GH_TOKEN"
    - "OPENAI_API_KEY"
    - "ANTHROPIC_API_KEY"
    - "NPM_TOKEN"
    - "PYPI_TOKEN"
    - "SSH_AUTH_SOCK"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
      - "~/.config/gh/**"
      - "**/*credentials*"
      - "**/*secret*"
      - "**/*token*"
  write:
    allow:
      - "./**"
    deny:
      - "./.git/**"
      - "./.orca/**"
    mode: staged

commands:
  default: ask
  allow:
    - "git status"
    - "git diff *"
    - "ls *"
    - "pwd"
  deny:
    - "rm -rf *"
    - "curl * | sh"
    - "wget * | bash"
    - "sudo *"
    - "cat .env"
    - "cat ~/.ssh/*"
  ask:
    - "git push*"
    - "npm install*"
    - "pnpm install*"
    - "yarn install*"
    - "pip install*"

network:
  mode: allowlist
  default: ask
  allow:
    - "api.github.com"
    - "*.github.com"
    - "registry.npmjs.org"
    - "pypi.org"
  deny:
    - "pastebin.com"
    - "*.ngrok.io"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: ask
  allow:
    - "*.search_*"
    - "*.list_*"
    - "*.get_*"
  deny:
    - "*.delete_*"
    - "*.shell"
    - "*.run_command"
    - "*.write_file"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
