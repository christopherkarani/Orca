# Orca preset: mcp-dev
# Conservative preset for developing stdio MCP servers through Orca.
# Manifests still need explicit command/hash binding; this policy does not trust servers by name alone.
version: 1
mode: ask

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
    - NODE_ENV
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*PASSWORD*"
    - "*PASSWD*"
    - "*PRIVATE*"
    - "*KEY*"
    - "AWS_*"
    - "GITHUB_TOKEN"
    - "GH_TOKEN"
    - "OPENAI_API_KEY"
    - "ANTHROPIC_API_KEY"
    - "NPM_TOKEN"
    - "PYPI_TOKEN"
    - "SSH_AUTH_SOCK"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
      - "~/.config/gh/**"
      - "**/*credentials*"
      - "**/*secret*"
      - "**/*token*"
  write:
    allow:
      - "./**"
    deny:
      - "./.git/**"
      - "./.orca/**"
    mode: staged

commands:
  default: ask
  allow:
    - "git status"
    - "git diff *"
    - "ls *"
    - "pwd"
    - "node --version"
    - "npm test*"
    - "zig build *"
  deny:
    - "rm -rf *"
    - "curl * | sh"
    - "wget * | bash"
    - "sudo *"
    - "cat .env"
    - "cat ~/.ssh/*"
  ask:
    - "npm install*"
    - "pnpm install*"
    - "yarn install*"
    - "pip install*"
    - "git push*"

network:
  mode: allowlist
  default: ask
  allow:
    - "api.github.com"
    - "*.github.com"
    - "registry.npmjs.org"
    - "pypi.org"
  deny:
    - "pastebin.com"
    - "*.ngrok.io"
    - "*.requestbin.net"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: ask
  allow:
    - "*.list_*"
    - "*.get_*"
    - "*.search_*"
  deny:
    - "*.delete_*"
    - "*.shell"
    - "*.run_command"
    - "*.sampling_create_message"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
