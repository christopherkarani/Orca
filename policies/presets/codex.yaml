# Orca preset: codex
# Generic/experimental: designed for local Codex-style coding tasks without assuming model-provider secrets.
# Network and writes stay reviewable by default.
version: 1
mode: ask

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*PASSWORD*"
    - "*PASSWD*"
    - "*PRIVATE*"
    - "*KEY*"
    - "AWS_*"
    - "AZURE_*"
    - "GITHUB_TOKEN"
    - "GH_TOKEN"
    - "OPENAI_API_KEY"
    - "ANTHROPIC_API_KEY"
    - "GOOGLE_API_KEY"
    - "NPM_TOKEN"
    - "PYPI_TOKEN"
    - "SSH_AUTH_SOCK"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
      - "~/.config/gh/**"
      - "**/*credentials*"
      - "**/*secret*"
      - "**/*token*"
  write:
    allow:
      - "./**"
    deny:
      # Dual patterns (see generic-agent.yaml for rationale).
      - "./.git/**"
      - ".git/**"
      - "./.orca/**"
      - ".orca/**"
    mode: staged

commands:
  default: ask
  allow:
    - "mkdir *"
    - "touch *"
    - "cp *"
    - "mv *"
    - "rmdir *"
    - "cat *"
    - "grep *"
    - "find *"
    - "head *"
    - "tail *"
    - "file *"
    - "stat *"
    - "which *"
    - "whoami"
    - "id"
    - "uname *"
    - "git status*"
    - "git diff"
    - "git diff *"
    - "git log"
    - "git log *"
    - "git branch"
    - "git branch *"
    - "git ls-files"
    - "git ls-files *"
    - "git add *"
    - "git commit *"
    - "git show *"
    - "git stash *"
    - "git fetch *"
    - "git pull *"
    - "git merge *"
    - "git remote *"
    - "git tag *"
    - "git cherry-pick *"
    - "git init"
    - "git clone *"
    - "ls"
    - "ls *"
    - "pwd"
    - "echo *"
    - "/usr/bin/env"
    - "true"
    - "false"
    - "rg *"
    - "wc *"
    - "sort *"
    - "uniq *"
    - "sed -n *"
    - "curl *"
    - "wget *"
    - "tar *"
    - "zip *"
    - "unzip *"
    - "gzip *"
    - "gunzip *"
    - "xargs *"
    - "zig version"
    - "zig build"
    - "zig build *"
    - "zig fmt"
    - "npm test*"
    - "npm run *"
    - "pnpm test*"
    - "pnpm run *"
    - "yarn test*"
    - "yarn run *"
    - "go test"
    - "go test *"
    - "go build"
    - "go build *"
    - "go run"
    - "go run *"
    - "go fmt"
    - "go fmt *"
    - "cargo test"
    - "cargo test *"
    - "cargo build"
    - "cargo build *"
    - "cargo run"
    - "cargo run *"
    - "cargo fmt"
    - "cargo check"
    - "cargo clippy"
    - "swift test*"
    - "swift build"
    - "swift build *"
    - "tsc"
    - "tsc *"
    - "cmake *"
    - "ninja *"
    - "make"
    - "make all"
    - "make clean"
    - "make test*"
    - "make build*"
    - "make check*"
    - "prettier *"
    - "eslint *"
    - "black *"
    - "isort *"
    - "gofmt *"
    - "rustfmt *"
    - "clang-format *"
    - "python -m pytest*"
    - "python -m venv *"
    - "python -m pip list*"
    - "python -m pip show*"
    - "pytest"
    - "pytest *"
  deny:
    - "rm -rf *"
    - "find * -delete"
    - "shred *"
    - "curl * | sh"
    - "wget * | bash"
    - "sudo *"
    - "su *"
    - "doas *"
    - "powershell *EncodedCommand*"
    - "powershell *-enc*"
    - "cat .env"
    - "cat ~/.ssh/*"
  ask:
    - "rm *"
    - "go mod *"
    - "make install*"
    - "git checkout *"
    - "git reset *"
    - "git rebase *"
    - "git push*"
    - "npm install*"
    - "pnpm install*"
    - "yarn install*"
    - "pip install*"

network:
  mode: allowlist
  # Keep in sync with generic-agent.yaml and src/policy/presets.zig.
  default: ask
  allow:
    - "api.github.com"
    - "*.github.com"
    - "registry.npmjs.org"
    - "pypi.org"
  ask:
    - "*.githubusercontent.com"
    - "objects.githubusercontent.com"
    - "codeload.github.com"
    - "api.openai.com"
    - "api.anthropic.com"
    - "generativelanguage.googleapis.com"
  deny:
    - "pastebin.com"
    - "*.ngrok.io"
    - "*.requestbin.net"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: ask
  allow:
    - "*.search_*"
    - "*.list_*"
    - "*.get_*"
  deny:
    - "*.delete_*"
    - "*.shell"
    - "*.run_command"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
