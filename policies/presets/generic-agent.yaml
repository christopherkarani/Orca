# Orca preset: generic-agent
# Conservative starting point for local coding agents with no proprietary assumptions.
# Edit allowlists for your repository before switching broad actions from ask to allow.
version: 1
mode: ask

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*PASSWORD*"
    - "*PASSWD*"
    - "*PRIVATE*"
    - "*KEY*"
    - "AWS_*"
    - "AZURE_*"
    - "GITHUB_TOKEN"
    - "GH_TOKEN"
    - "OPENAI_API_KEY"
    - "ANTHROPIC_API_KEY"
    - "GOOGLE_API_KEY"
    - "GOOGLE_APPLICATION_CREDENTIALS"
    - "NPM_TOKEN"
    - "PYPI_TOKEN"
    - "SSH_AUTH_SOCK"

files:
  read:
    allow:
      - "./**"
    deny:
      # Expanded secret protections (kept in sync with the authoritative
      # embedded common_strict_rules used by quick-install presets).
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
      - "~/.gcloud/**"
      - "~/.azure/**"
      - "~/.config/gh/**"
      - "~/Library/Keychains/**"
      - "./Library/Keychains/**"
      - "~/Library/Application Support/**/Cookies*"
      - "./Library/Application Support/**/Cookies*"
      - "~/Library/Application Support/**/Login Data*"
      - "./Library/Application Support/**/Login Data*"
      - "~/Library/Application Support/Google/Chrome/**"
      - "./Library/Application Support/Google/Chrome/**"
      - "~/Library/Application Support/BraveSoftware/**"
      - "./Library/Application Support/BraveSoftware/**"
      - "~/Library/Application Support/Firefox/**"
      - "./Library/Application Support/Firefox/**"
      - "~/Library/Mobile Documents/**"
      - "./Library/Mobile Documents/**"
      - "~/.zsh_history"
      - "~/.bash_history"
      - "~/.zshrc"
      - "~/.bashrc"
      - "~/.profile"
      - "**/id_rsa"
      - "**/id_ed25519"
      - "**/*credentials*"
      - "**/*credential*"
      - "**/*secret*"
      - "**/*token*"
  write:
    allow:
      - "./**"
    deny:
      # Dual patterns for robustness across hook/plugin callers (Hermes,
      # OpenClaw, raw CLI) that may normalize paths without leading "./".
      # See matchesPath + stripLeadingDotSlash in src/policy/matchers.zig.
      - "./.git/**"
      - ".git/**"
      - "./.orca/**"
      - ".orca/**"
    mode: staged

commands:
  default: ask
  allow:
    - "git status"
    - "git diff *"
    - "ls *"
    - "pwd"
    - "echo *"
    - "zig version"
    - "zig build *"
  deny:
    - "rm -rf *"
    - "find * -delete"
    - "shred *"
    - "curl * | sh"
    - "wget * | bash"
    - "sudo *"
    - "su *"
    - "doas *"
    - "cat .env"
    - "cat ~/.ssh/*"
  ask:
    - "git push*"
    - "npm install*"
    - "pnpm install*"
    - "yarn install*"
    - "pip install*"

network:
  mode: allowlist
  # default: deny is the deliberate conservative choice for the quick-install
  # experience (used by `orca init --preset generic-agent` and `setup --auto`).
  # Most egress remains reviewable. See embedded common_strict_rules in
  # src/policy/presets.zig for the authoritative version shipped in the binary.
  default: deny
  allow:
    - "api.github.com"
    - "*.github.com"
    - "registry.npmjs.org"
    - "pypi.org"
  ask:
    - "*.githubusercontent.com"
    # Curated low-risk GitHub CDNs (release artifacts + source tarballs) added
    # to reduce unnecessary friction for common legitimate agent fetches
    # while keeping the conservative default: deny posture.
    - "objects.githubusercontent.com"
    - "codeload.github.com"
  deny:
    - "pastebin.com"
    - "*.ngrok.io"
    - "*.requestbin.net"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: ask
  allow:
    - "*.search_*"
    - "*.list_*"
    - "*.get_*"
  deny:
    - "*.delete_*"
    - "*.shell"
    - "*.run_command"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
