# Orca preset: strict-local
# Local strict mode. Unknown actions are denied or staged; add narrow allow rules as needed.
version: 1
mode: strict

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*PASSWORD*"
    - "*PASSWD*"
    - "*PRIVATE*"
    - "*KEY*"
    - "AWS_*"
    - "AZURE_*"
    - "GITHUB_TOKEN"
    - "GH_TOKEN"
    - "OPENAI_API_KEY"
    - "ANTHROPIC_API_KEY"
    - "NPM_TOKEN"
    - "PYPI_TOKEN"
    - "SSH_AUTH_SOCK"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
      - "~/.config/gh/**"
      - "**/*credentials*"
      - "**/*secret*"
      - "**/*token*"
  write:
    allow:
      - "./**"
    deny:
      - "./.git/**"
      - "./.orca/**"
    mode: staged

commands:
  default: deny
  allow:
    - "git status"
    - "git diff *"
    - "ls *"
    - "pwd"
    - "zig version"
    - "zig build *"
  deny:
    - "rm -rf *"
    - "find * -delete"
    - "curl * | sh"
    - "wget * | bash"
    - "sudo *"
    - "cat .env"
    - "cat ~/.ssh/*"

network:
  mode: allowlist
  default: deny
  allow:
    - "api.github.com"
    - "*.github.com"
  deny:
    - "pastebin.com"
    - "*.ngrok.io"
    - "*.requestbin.net"
  detect_exfiltration:
    dns: true
    long_query_strings: true
    secret_patterns: true

mcp:
  default: deny
  allow:
    - "*.list_*"
    - "*.get_*"
    - "*.search_*"
  deny:
    - "*.delete_*"
    - "*.shell"
    - "*.run_command"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
