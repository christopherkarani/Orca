version: 1
mode: strict

workspace:
  root: "."
  write_mode: staged

env:
  inherit: false
  allow:
    - PATH
    - HOME
    - LANG
    - TERM
  deny_patterns:
    - "*TOKEN*"
    - "*SECRET*"
    - "*KEY*"
    - "AWS_*"

files:
  read:
    allow:
      - "./**"
    deny:
      - "./.env"
      - "./.env.*"
      - "~/.ssh/**"
      - "~/.aws/**"
  write:
    allow:
      - "./**"
    deny:
      - "./.git/**"
      - "./.aegis/**"
    mode: staged

commands:
  default: ask
  allow:
    - "git status"
    - "git diff *"
  deny:
    - "rm -rf *"
    - "curl * | sh"
    - "sudo *"

network:
  default: deny
  allow:
    - "api.github.com"
    - "registry.npmjs.org"

mcp:
  default: ask
  deny:
    - "*.shell"
    - "*.run_command"

audit:
  level: full
  redact_secrets: true
  tamper_evident: true
