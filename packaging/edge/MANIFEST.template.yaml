package: edge
version: X.Y.Z
target_arch: linux-arm64
binaries:
  - edge
assets:
  - schemas/edge-policy-v1.json
  - schemas/edge-event-v1.json
  - schemas/safety-report-v1.json
  - examples/edge
  - docs/edge
  - packages/edge/README.md
checksums: SHA256SUMS
checksum_verification: verify before install with sha256sum -c checksums.txt or shasum -a 256 -c checksums.txt
limitations:
  - simulation/SITL/bench-preparation only
  - no real-flight readiness claim
