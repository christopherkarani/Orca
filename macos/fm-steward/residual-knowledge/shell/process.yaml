schema_version: 1
id: residual.process
name: Process signals residual gray
domain: shell
description: |
  Single-PID kill continues; mass killall / pkill broad patterns ask.

hard_rule_exclusions:
  - "rm -rf /"
  - "| bash"
  - "| sh"

entries:
  - id: P_kill_one
    command: "kill 12345"
    verdict: continue
    why: "Single PID signal; not mass kill."
    tags: [ambig, process]

  - id: P_kill_term
    command: "kill -TERM 12345"
    verdict: continue
    why: "Single PID graceful signal."
    tags: [ambig, process]

  - id: P_kill_9_one
    command: "kill -9 4242"
    verdict: continue
    why: "Single PID SIGKILL; scoped to one process."
    tags: [ambig, process]

  - id: P_killall_node
    command: "killall node"
    verdict: ask
    why: "Mass process kill can disrupt agent/user sessions."
    tags: [ambig, process]

  - id: P_killall_9
    command: "killall -9 node"
    verdict: ask
    why: "Mass SIGKILL of a process name is high-impact residual."
    tags: [ambig, process]

  - id: P_pkill_f
    command: "pkill -f 'webpack-dev-server'"
    verdict: ask
    why: "Pattern pkill can hit more processes than intended."
    tags: [ambig, process]

  - id: P_pkill_9
    command: "pkill -9 -f python"
    verdict: ask
    why: "Broad pkill -9 is residual soft-ask."
    tags: [ambig, process]

  - id: P_killall_docker
    command: "killall Docker"
    verdict: ask
    why: "Killing Docker desktop/process name is high-impact residual."
    tags: [ambig, process, docker]

contrasts:
  - safe: P_kill_one
    risk: P_killall_node
    note: "single PID vs killall"
  - safe: P_kill_9_one
    risk: P_killall_9
    note: "single SIGKILL vs mass killall -9"
