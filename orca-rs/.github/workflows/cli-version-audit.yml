name: cli-version-audit

on:
  schedule:
    # Weekly audit (Sunday 02:30 UTC)
    - cron: "30 2 * * 0"
  workflow_dispatch:

jobs:
  version_audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run CLI version checker
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/check_cli_versions.sh
